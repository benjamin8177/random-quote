<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <a href="../../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Bosh sahifa</a>

    <div class="quote-box">
        <h2>Hikmatli so'zlar</h2>
        
        <blockquote id="quote">"Bilim — bu kuch, lekin uni amalda qo'llash buyuklikdir."</blockquote>
        <span id="author">- Noma'lum</span>

        <div class="actions">
            <button id="twitter" onclick="tweetQuote()"><i class="fab fa-twitter"></i> Ulashish</button>
            <button id="new-quote" onclick="getQuote()">Yangi so'z</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
